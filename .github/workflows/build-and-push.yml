name: Build and Push Agents

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: release-please
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent:
          - { name: "firecrawl", path: "rust/agent-firecrawl", type: "rust", dockerfile: "rust/agent-firecrawl.Dockerfile" }
          - { name: "deepwiki", path: "rust/agent-deepwiki", type: "rust", dockerfile: "rust/agent-deepwiki.Dockerfile" }
          - { name: "elevenlabs", path: "rust/agent-elevenlabs", type: "rust", dockerfile: "rust/agent-elevenlabs.Dockerfile" }
          - { name: "replicate", path: "rust/agent-replicate", type: "rust", dockerfile: "rust/agent-replicate.Dockerfile" }
          - { name: "deepwiki-koog", path: "koog/agent-deepwiki", type: "koog" }
          - { name: "replicate-koog", path: "koog/agent-replicate", type: "koog" }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - '${{ matrix.agent.path }}/**'
              - '${{ matrix.agent.type == 'koog' && 'koog/shared/**' || matrix.agent.path }}/**'

      - name: Rust Cache
        if: steps.filter.outputs.changed == 'true' && matrix.agent.type == 'rust'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Set up Java
        if: steps.filter.outputs.changed == 'true' && matrix.agent.type == 'koog'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.changed == 'true' && matrix.agent.type == 'rust'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.filter.outputs.changed == 'true' && matrix.agent.type == 'rust'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        if: steps.filter.outputs.changed == 'true' && matrix.agent.type == 'rust'
        run: |
          # Extract metadata from coral-agent.toml
          # Assuming version and image are always present
          VERSION=$(grep '^version =' ${{ matrix.agent.path }}/coral-agent.toml | head -n 1 | cut -d '"' -f 2)
          IMAGE=$(grep '^image =' ${{ matrix.agent.path }}/coral-agent.toml | head -n 1 | cut -d '"' -f 2)
          
          echo "Building image $IMAGE:$VERSION"
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" -f ${{ matrix.agent.dockerfile }} rust/
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

      - name: Build Koog Agent
        if: steps.filter.outputs.changed == 'true' && matrix.agent.type == 'koog'
        run: |
          ./koog/gradlew -p koog :${{ matrix.agent.name == 'deepwiki-koog' && 'agent-deepwiki' || 'agent-replicate' }}:build

      - name: Publish to Marketplace
        if: |
          steps.filter.outputs.changed == 'true' &&
          contains(fromJson(needs.release-please.outputs.paths_released || '[]'), matrix.agent.path)
        env:
          CORAL_API_KEY: ${{ secrets.CORAL_API_KEY }}
          CORAL_MARKETPLACE_URL: ${{ vars.CORAL_MARKETPLACE_URL || 'https://marketplace.coralprotocol.ai' }}
        run: |
          # Use the manifest file for publishing
          MANIFEST_PATH="${{ matrix.agent.path }}/coral-agent.toml"
          
          echo "Publishing agent from $MANIFEST_PATH to $CORAL_MARKETPLACE_URL"
          
          # POST to marketplace as per SKILL.md
          curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "$CORAL_MARKETPLACE_URL/api/v1/agents" \
            -H "Authorization: Bearer $CORAL_API_KEY" \
            -H "Content-Type: text/plain" \
            --data-binary "@$MANIFEST_PATH" > response.txt
            
          HTTP_STATUS=$(tail -n 1 response.txt | cut -d ':' -f 2)
          sed -i '$d' response.txt # Remove the last line (HTTP_STATUS)
          
          if [ "$HTTP_STATUS" == "200" ]; then
            echo "Published successfully!"
          elif [ "$HTTP_STATUS" == "409" ]; then
            echo "Warning: Version already exists (Conflict). Not necessarily an error if nothing changed but version wasn't bumped."
            cat response.txt
          else
            echo "Error: Failed to publish (HTTP $HTTP_STATUS)"
            cat response.txt
            exit 1
          fi
          
          # Placeholder for DELETE method as requested in issue
          # # DELETE method placeholder (uncomment when available)
          # # OLD_VERSION=$(...)
          # # SLUG=$(...)
          # # curl -X DELETE "$CORAL_MARKETPLACE_URL/api/v1/agents/$SLUG/versions/$OLD_VERSION" \
          # #   -H "Authorization: Bearer $CORAL_API_KEY"
